<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda+ — Sistema de Agendamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════════
       TELA DE LOGIN / CADASTRO
       ══════════════════════════════════════════════════ -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">Agenda<span>+</span></div>
      <p class="auth-sub">Sistema de Agendamentos</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Cadastrar</button>
      </div>

      <!-- Login -->
      <div id="form-login">
        <div class="auth-field">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" />
        </div>
        <div class="auth-field">
          <label>Senha</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <div class="auth-error" id="login-error"></div>
        <button class="auth-btn-primary" onclick="loginEmail()">Entrar</button>
        <div class="auth-divider"><span>ou</span></div>
        <button class="auth-btn-google" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continuar com Google
        </button>
      </div>

      <!-- Cadastro -->
      <div id="form-register" style="display:none">
        <div class="auth-field">
          <label>Nome completo</label>
          <input type="text" id="reg-name" placeholder="João Silva" />
        </div>
        <div class="auth-field">
          <label>E-mail</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" />
        </div>
        <div class="auth-field">
          <label>Senha</label>
          <input type="password" id="reg-password" placeholder="mínimo 6 caracteres" />
        </div>
        <div class="auth-error" id="reg-error"></div>
        <button class="auth-btn-primary" onclick="registerEmail()">Criar conta</button>
        <div class="auth-divider"><span>ou</span></div>
        <button class="auth-btn-google" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continuar com Google
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       APP PRINCIPAL
       ══════════════════════════════════════════════════ -->
  <div class="app" id="app" style="display:none">

    <aside class="sidebar">
      <div class="logo">Agenda<span>+</span></div>
      <div class="logo-sub">Sistema de Agendamentos</div>

      <!-- Usuário logado -->
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-details">
          <div class="user-name" id="user-name">—</div>
          <div class="user-email" id="user-email"></div>
        </div>
        <button class="btn-logout" onclick="logout()" title="Sair">
          <i class="ti ti-logout"></i>
        </button>
      </div>

      <div class="sidebar-divider"></div>

      <div class="mini-cal">
        <div class="mini-cal-header">
          <h3 id="mini-month-year">Maio 2026</h3>
          <div style="display:flex;gap:4px;">
            <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
            <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
          </div>
        </div>
        <div class="weekdays">
          <span>D</span><span>S</span><span>T</span><span>Q</span>
          <span>Q</span><span>S</span><span>S</span>
        </div>
        <div class="days-grid" id="mini-days"></div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="upcoming">
        <h4>Próximos</h4>
        <div id="upcoming-list"></div>
      </div>

      <div class="db-status" id="db-status">
        <span class="db-dot" id="db-dot"></span>
        <span id="db-label">Conectando...</span>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <div class="selected-date-display">
          <h2 id="main-date-title">Carregando...</h2>
          <p id="main-date-sub">Selecione um horário disponível</p>
        </div>
        <button class="btn-new" onclick="scrollToForm()">
          <i class="ti ti-plus" aria-hidden="true"></i> Novo Agendamento
        </button>
      </div>

      <div class="summary-strip">
        <div class="summary-pill"><span class="pill-num" id="count-today">0</span> hoje</div>
        <div class="summary-pill"><span class="pill-num" id="count-week">0</span> esta semana</div>
        <div class="summary-pill"><span class="pill-num" id="count-total">0</span> total</div>
      </div>

      <div class="section-label">Serviço</div>
      <div class="services-grid" id="services-grid"></div>

      <div class="section-label">Horários disponíveis</div>
      <div class="time-slots" id="time-slots"></div>

      <div class="booking-form" id="booking-form">
        <h3>Confirmar Agendamento</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="inp-name">Nome completo</label>
            <input type="text" id="inp-name" placeholder="João Silva" />
          </div>
          <div class="form-group">
            <label for="inp-phone">Telefone</label>
            <input type="text" id="inp-phone" placeholder="(84) 99999-0000" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="inp-email">E-mail</label>
            <input type="email" id="inp-email" placeholder="joao@email.com" />
          </div>
          <div class="form-group">
            <label for="inp-obs">Observação</label>
            <textarea id="inp-obs" placeholder="Alguma observação?"></textarea>
          </div>
        </div>
        <button class="btn-confirm" onclick="confirmBooking()">Confirmar Agendamento</button>
      </div>

      <div class="section-label" id="appts-label">Agendamentos do dia</div>
      <div id="appointments-list"></div>
    </main>

  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDKs compat (sem bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
